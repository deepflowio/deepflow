name: vinterface
orm_name: VInterface

cache_diffbase:
  enabled: true
  fields:
    - name: name
      orm_name: Name
      type: string
    - name: type
      orm_name: Type
      type: int
    - name: tap_mac
      orm_name: TapMac
      type: string
    - name: netns_id
      orm_name: NetnsID
      type: uint32
    - name: vtap_id
      orm_name: VtapID
      type: uint32
    - name: vpc_id
      orm_name: VPCID
      type: int
    - name: device_type
      orm_name: DeviceType
      type: int
    - name: device_lcuuid
      orm_name: DeviceLcuuid
      type: string
      is_extension: true
    - name: network_lcuuid
      orm_name: NetworkID
      type: string
      ref:
        resource: network
        lookup_by: id
        target: lcuuid
    - name: region_lcuuid
      orm_name: Region
      type: string
    - name: sub_domain_lcuuid
      orm_name: SubDomain
      type: string
  extensions:
    - struct

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: if_type
    orm_name: Type
    type: int
  - name: index
    orm_name: Index
    type: int
  - name: mac
    orm_name: Mac
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: region
      lookup_by: lcuuid
      target: id
  - name: network_id
    orm_name: NetworkID
    type: int
  - name: vpc_id
    orm_name: VPCID
    type: int
  - name: device_type
    orm_name: DeviceType
    type: int
  - name: device_id
    orm_name: DeviceID
    type: int
  - name: device_name
    type: string
    is_extension: true
  extensions:
    - collection
    - struct

pubsub:
  message:
    enabled: true
    fields:
      - name: name
        type: string
      - name: tap_mac
        type: string
      - name: type
        type: int
      - name: netns_id
        type: uint32
      - name: vtap_id
        type: uint32
      - name: network_id
        type: int
      - name: network_lcuuid
        type: string
      - name: region_lcuuid
        type: string
