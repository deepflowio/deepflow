name: vinterface
orm_name: VInterface
cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: if_type
    orm_name: Type
    type: int
  - name: index
    orm_name: Index
    type: int
  - name: mac
    orm_name: Mac
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: Region
      lookup_method: GetByLcuuid
      target_field: Id
  - name: network_id
    orm_name: NetworkID
    type: int
  - name: vpc_id
    orm_name: VPCID
    type: int
  - name: device_type
    orm_name: DeviceType
    type: int
  - name: device_id
    orm_name: DeviceID
    type: int
  - name: device_name
    type: string
    is_extension: true
  extensions:
    - collection
    - struct
