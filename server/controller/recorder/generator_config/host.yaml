name: host
orm_name: Host

cache_diffbase:
  enabled: true
  fields:
    - name: name
      orm_name: Name
      type: string
    - name: ip
      orm_name: IP
      type: string
    - name: hostname
      orm_name: Hostname
      type: string
    - name: htype
      orm_name: HType
      type: int
    - name: vcpu_num
      orm_name: VCPUNum
      type: int
    - name: mem_total
      orm_name: MemTotal
      type: int
    - name: extra_info
      orm_name: ExtraInfo
      type: string
    - name: region_lcuuid
      orm_name: Region
      type: string
    - name: az_lcuuid
      orm_name: AZ
      type: string

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: Region
      lookup_method: GetByLcuuid
      target_field: Id
  - name: az_id
    orm_name: AZ
    type: int
    ref:
      resource: Az
      lookup_method: GetByLcuuid
      target_field: Id
  - name: ip
    orm_name: IP
    type: string
    for_index: true
