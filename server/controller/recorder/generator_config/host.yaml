name: host
orm_name: Host
cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: Region
      lookup_method: GetByLcuuid
      target_field: Id
  - name: az_id
    orm_name: AZ
    type: int
    ref:
      resource: Az
      lookup_method: GetByLcuuid
      target_field: Id
  - name: ip
    orm_name: IP
    type: string
    for_index: true
