name: lb
orm_name: LB

cache_diffbase:
  enabled: true
  fields:
    - name: name
      orm_name: Name
      type: string
    - name: model
      orm_name: Model
      type: int
    - name: vip
      orm_name: VIP
      type: string
    - name: vpc_lcuuid
      orm_name: VPCID
      type: string
      ref:
        resource: vpc
        lookup_by: id
        target: lcuuid
    - name: region_lcuuid
      orm_name: Region
      type: string

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: region
      lookup_by: lcuuid
      target: id
  - name: vpc_id
    orm_name: VPCID
    type: int

pubsub:
  message:
    enabled: true
    fields:
      - name: name
        type: string
      - name: uid
        type: string
      - name: model
        type: int
      - name: vip
        type: string
      - name: region_lcuuid
        type: string
