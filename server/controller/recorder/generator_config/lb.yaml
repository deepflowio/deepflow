name: lb
orm_name: LB
cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: Region
      lookup_method: GetByLcuuid
      target_field: Id
  - name: vpc_id
    orm_name: VPCID
    type: int
