name: pod_namespace
orm_name: PodNamespace

cache_diffbase:
  enabled: true
  fields:
    - name: region_lcuuid
      orm_name: Region
      type: string
    - name: az_lcuuid
      orm_name: AZ
      type: string
    - name: sub_domain_lcuuid
      orm_name: SubDomain
      type: string
    - name: learned_cloud_tags
      orm_name: LearnedCloudTags
      type: map[string]string

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: region
      lookup_by: lcuuid
      target: id
  - name: az_id
    orm_name: AZ
    type: int
    ref:
      resource: az
      lookup_by: lcuuid
      target: id
  - name: pod_cluster_id
    orm_name: PodClusterID
    type: int

pubsub:
  message:
    enabled: true
    fields:
      - name: learned_cloud_tags
        type: map[string]string
      - name: custom_cloud_tags
        type: map[string]string
      - name: az_lcuuid
        type: string
      - name: region_lcuuid
        type: string
      - name: name
        type: string
      - name: pod_cluster_id
        type: int
