name: lb_listener
orm_name: LBListener

cache_diffbase:
  enabled: true
  fields:
    - name: name
      orm_name: Name
      type: string
    - name: ips
      orm_name: IPs
      type: string
    - name: snat_ips
      orm_name: SNATIPs
      type: string
    - name: port
      orm_name: Port
      type: int
    - name: protocol
      orm_name: Protocol
      type: string

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: lb_id
    orm_name: LBID
    type: int
