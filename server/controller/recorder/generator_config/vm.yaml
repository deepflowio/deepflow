name: vm
orm_name: VM
cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: Region
      lookup_method: GetByLcuuid
      target_field: Id
  - name: az_id
    orm_name: AZ
    type: int
    ref:
      resource: Az
      lookup_method: GetByLcuuid
      target_field: Id
  - name: vpc_id
    orm_name: VPCID
    type: int
  - name: host_id
    orm_name: HostID
    type: int
  - name: network_id
    orm_name: NetworkID
    type: int
  - name: pod_node_id
    orm_name: PodNodeID
    type: int
    for_mutation: true
