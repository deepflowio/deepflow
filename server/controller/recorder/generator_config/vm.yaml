name: vm
orm_name: VM

cache_diffbase:
  enabled: true
  fields:
    - name: name
      orm_name: Name
      type: string
    - name: label
      orm_name: Label
      type: string
    - name: ip
      orm_name: IP
      type: string
    - name: hostname
      orm_name: Hostname
      type: string
    - name: state
      orm_name: State
      type: int
    - name: htype
      orm_name: HType
      type: int
    - name: launch_server
      orm_name: LaunchServer
      type: string
    - name: vpc_lcuuid
      orm_name: VPCID
      type: string
      ref:
        resource: vpc
        lookup_by: id
        target: lcuuid
    - name: region_lcuuid
      orm_name: Region
      type: string
    - name: az_lcuuid
      orm_name: AZ
      type: string
    - name: learned_cloud_tags
      orm_name: LearnedCloudTags
      type: map[string]string
    - name: network_lcuuid
      orm_name: NetworkID
      type: string
      ref:
        resource: network
        lookup_by: id
        target: lcuuid
    - name: host_id
      orm_name: LaunchServer
      type: int
      ref:
        resource: host
        lookup_by: ip
        target: id

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: region
      lookup_by: lcuuid
      target: id
  - name: az_id
    orm_name: AZ
    type: int
    ref:
      resource: az
      lookup_by: lcuuid
      target: id
  - name: vpc_id
    orm_name: VPCID
    type: int
  - name: host_id
    orm_name: HostID
    type: int
  - name: network_id
    orm_name: NetworkID
    type: int
  - name: pod_node_id
    orm_name: PodNodeID
    type: int
    for_mutation: true

pubsub:
  message:
    enabled: true
    fields:
      - name: name
        type: string
      - name: ip
        type: string
      - name: label
        type: string
      - name: state
        type: int
      - name: htype
        type: int
      - name: launch_server
        type: string
      - name: learned_cloud_tags
        type: map[string]string
      - name: custom_cloud_tags
        type: map[string]string
      - name: host_id
        type: int
      - name: uid
        type: string
      - name: hostname
        type: string
      - name: vpc_id
        type: int
      - name: vpc_lcuuid
        type: string
      - name: az_lcuuid
        type: string
      - name: region_lcuuid
        type: string
      - name: network_id
        type: int
      - name: network_lcuuid
        type: string
