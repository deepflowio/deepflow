name: vrouter
orm_name: VRouter

cache_diffbase:
  enabled: true
  fields:
    - name: name
      orm_name: Name
      type: string
    - name: label
      orm_name: Label
      type: string
    - name: vpc_lcuuid
      orm_name: VPCID
      type: string
      ref:
        resource: vpc
        lookup_by: id
        target: lcuuid
    - name: region_lcuuid
      orm_name: Region
      type: string

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: region
      lookup_by: lcuuid
      target: id
  - name: vpc_id
    orm_name: VPCID
    type: int
  - name: gw_launch_server
    orm_name: GWLaunchServer
    type: string

pubsub:
  message:
    enabled: true
    fields:
      - name: name
        type: string
      - name: label
        type: string
      - name: vpc_id
        type: int
      - name: vpc_lcuuid
        type: string
      - name: region_lcuuid
        type: string
