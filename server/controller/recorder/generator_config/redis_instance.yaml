name: redis_instance
orm_name: RedisInstance

cache_diffbase:
  enabled: true
  fields:
    - name: name
      orm_name: Name
      type: string
    - name: state
      orm_name: State
      type: int
    - name: public_host
      orm_name: PublicHost
      type: string
    - name: region_lcuuid
      orm_name: Region
      type: string
    - name: az_lcuuid
      orm_name: AZ
      type: string

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: Region
      lookup_method: GetByLcuuid
      target_field: Id
  - name: az_id
    orm_name: AZ
    type: int
    ref:
      resource: Az
      lookup_method: GetByLcuuid
      target_field: Id
  - name: vpc_id
    orm_name: VPCID
    type: int
