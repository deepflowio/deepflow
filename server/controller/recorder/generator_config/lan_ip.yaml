name: lan_ip
orm_name: LANIP

cache_diffbase:
  enabled: true
  fields:
    - name: sub_domain_lcuuid
      orm_name: SubDomain
      type: string

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: ip
    orm_name: IP
    type: string
  - name: vinterface_id
    orm_name: VInterfaceID
    type: int
  extensions:
    - collection

pubsub:
  message:
    enabled: true
    fields:
      - name: subnet_id
        type: int
      - name: subnet_lcuuid
        type: string
