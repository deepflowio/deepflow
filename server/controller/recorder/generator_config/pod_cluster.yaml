name: pod_cluster
orm_name: PodCluster

cache_diffbase:
  enabled: true
  fields:
    - name: name
      orm_name: Name
      type: string
    - name: cluster_name
      orm_name: ClusterName
      type: string
    - name: region_lcuuid
      orm_name: Region
      type: string
    - name: az_lcuuid
      orm_name: AZ
      type: string
    - name: sub_domain_lcuuid
      orm_name: SubDomain
      type: string

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: region
      lookup_by: lcuuid
      target: id
  - name: az_id
    orm_name: AZ
    type: int
    ref:
      resource: az
      lookup_by: lcuuid
      target: id
  - name: vpc_id
    orm_name: VPCID
    type: int

pubsub:
  message:
    enabled: true
    fields:
      - name: name
        type: string
      - name: cluster_name
        type: string
      - name: az_lcuuid
        type: string
      - name: region_lcuuid
        type: string
