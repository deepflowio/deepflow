name: pod_replica_set
orm_name: PodReplicaSet

cache_diffbase:
  enabled: true
  fields:
    - name: name
      orm_name: Name
      type: string
    - name: label
      orm_name: Label
      type: string
    - name: pod_num
      orm_name: PodNum
      type: int
    - name: region_lcuuid
      orm_name: Region
      type: string
    - name: az_lcuuid
      orm_name: AZ
      type: string
    - name: sub_domain_lcuuid
      orm_name: SubDomain
      type: string

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: region
      lookup_by: lcuuid
      target: id
  - name: az_id
    orm_name: AZ
    type: int
    ref:
      resource: az
      lookup_by: lcuuid
      target: id
  - name: pod_group_id
    orm_name: PodGroupID
    type: int
  - name: pod_namespace_id
    orm_name: PodNamespaceID
    type: int
  - name: pod_cluster_id
    orm_name: PodClusterID
    type: int

pubsub:
  message:
    enabled: true
    fields:
      - name: name
        type: string
      - name: label
        type: string
      - name: pod_num
        type: int
      - name: az_lcuuid
        type: string
      - name: region_lcuuid
        type: string
