name: pod_node
orm_name: PodNode

cache_diffbase:
  enabled: true
  fields:
    - name: type
      orm_name: Type
      type: int
    - name: state
      orm_name: State
      type: int
    - name: hostname
      orm_name: Hostname
      type: string
    - name: ip
      orm_name: IP
      type: string
    - name: vcpu_num
      orm_name: VCPUNum
      type: int
    - name: mem_total
      orm_name: MemTotal
      type: int
    - name: region_lcuuid
      orm_name: Region
      type: string
    - name: az_lcuuid
      orm_name: AZ
      type: string
    - name: sub_domain_lcuuid
      orm_name: SubDomain
      type: string

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: domain_lcuuid
    orm_name: Domain
    type: string
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: region
      lookup_by: lcuuid
      target: id
  - name: az_id
    orm_name: AZ
    type: int
    ref:
      resource: az
      lookup_by: lcuuid
      target: id
  - name: vpc_id
    orm_name: VPCID
    type: int
  - name: pod_cluster_id
    orm_name: PodClusterID
    type: int
  - name: vm_id
    orm_name: VMID
    type: int
    for_mutation: true

pubsub:
  message:
    enabled: true
    fields:
      - name: type
        type: int
      - name: state
        type: int
      - name: hostname
        type: string
      - name: ip
        type: string
      - name: vcpu_num
        type: int
      - name: mem_total
        type: int
      - name: az_lcuuid
        type: string
      - name: region_lcuuid
        type: string
      - name: name
        type: string
