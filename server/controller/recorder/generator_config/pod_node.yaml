name: pod_node
orm_name: PodNode
cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: domain_lcuuid
    orm_name: Domain
    type: string
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: Region
      lookup_method: GetByLcuuid
      target_field: Id
  - name: az_id
    orm_name: AZ
    type: int
    ref:
      resource: Az
      lookup_method: GetByLcuuid
      target_field: Id
  - name: vpc_id
    orm_name: VPCID
    type: int
  - name: pod_cluster_id
    orm_name: PodClusterID
    type: int
  - name: vm_id
    orm_name: VMID
    type: int
    for_mutation: true
