name: pod_node
orm_name: PodNode

cache_diffbase:
  enabled: true
  fields:
    - name: type
      orm_name: Type
      type: int
    - name: state
      orm_name: State
      type: int
    - name: hostname
      orm_name: Hostname
      type: string
    - name: ip
      orm_name: IP
      type: string
    - name: vcpu_num
      orm_name: VCPUNum
      type: int
    - name: mem_total
      orm_name: MemTotal
      type: int
    - name: region_lcuuid
      orm_name: Region
      type: string
    - name: az_lcuuid
      orm_name: AZ
      type: string
    - name: sub_domain_lcuuid
      orm_name: SubDomain
      type: string

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: domain_lcuuid
    orm_name: Domain
    type: string
  - name: name
    orm_name: Name
    type: string
  - name: region_id
    orm_name: Region
    type: int
    ref:
      resource: Region
      lookup_method: GetByLcuuid
      target_field: Id
  - name: az_id
    orm_name: AZ
    type: int
    ref:
      resource: Az
      lookup_method: GetByLcuuid
      target_field: Id
  - name: vpc_id
    orm_name: VPCID
    type: int
  - name: pod_cluster_id
    orm_name: PodClusterID
    type: int
  - name: vm_id
    orm_name: VMID
    type: int
    for_mutation: true
