name: process
orm_name: Process

cache_diffbase:
  enabled: true
  fields:
    - name: name
      orm_name: Name
      type: string
    - name: os_app_tags
      orm_name: OSAPPTags
      type: string
    - name: container_id
      orm_name: ContainerID
      type: string
    - name: device_type
      orm_name: DeviceType
      type: int
    - name: device_id
      orm_name: DeviceID
      type: int

cache_tool:
  enabled: true
  fields:
  - name: lcuuid
    orm_name: Lcuuid
    type: string
    for_validation: true
  - name: id
    orm_name: ID
    type: int
  - name: name
    orm_name: Name
    type: string
  - name: device_type
    orm_name: DeviceType
    type: int
  - name: device_id
    orm_name: DeviceID
    type: int
  - name: pod_group_id
    orm_name: PodGroupID
    type: int
  - name: pod_node_id
    orm_name: PodNodeID
    type: int
  - name: vm_id
    orm_name: VMID
    type: int
  - name: vpc_id
    orm_name: VPCID
    type: int
  extensions:
    - collection

pubsub:
  message:
    enabled: true
    add_addition: ProcessAddAddition
    delete_addition: ProcessDeleteAddition
    fields:
      - name: name
        type: string
      - name: process_name
        type: string
      - name: container_id
        type: string
      - name: os_app_tags
        type: string
      - name: vm_id
        type: int
      - name: vpc_id
        type: int
      - name: gid
        type: uint32
